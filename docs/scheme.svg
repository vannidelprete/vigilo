<svg viewBox="0 0 740 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="monospace" font-size="11">
  <title>Vigilo wiring diagram</title>
  <desc>ESP32 connected to MPU6050 via I2C and to a 3-pin fan tachometer, powered by USB and 12V supply.</desc>

  <style>
    text { fill: #1a1a1a; }
    .label { font-size: 10px; }
    .pin { font-size: 9px; fill: #666; }
  </style>

  <!-- ESP32 -->
  <rect x="60" y="80" width="120" height="200" rx="6" fill="none" stroke="#4a90d9" stroke-width="2"/>
  <text x="120" y="72" text-anchor="middle" font-weight="bold" fill="#4a90d9">ESP32</text>
  <circle cx="60" cy="117" r="3" fill="#e74c3c"/>
  <text x="70" y="121" class="pin">3.3V</text>
  <circle cx="60" cy="142" r="3" fill="#2c2c2c"/>
  <text x="70" y="146" class="pin">GND</text>
  <circle cx="60" cy="177" r="3" fill="#f39c12"/>
  <text x="70" y="181" class="pin">D21 SDA</text>
  <circle cx="60" cy="202" r="3" fill="#9b59b6"/>
  <text x="70" y="206" class="pin">D22 SCL</text>
  <circle cx="180" cy="242" r="3" fill="#27ae60"/>
  <text x="135" y="246" class="pin">D4</text>
  <circle cx="180" cy="267" r="3" fill="#2c2c2c"/>
  <text x="135" y="271" class="pin">GND</text>
  <text x="120" y="300" text-anchor="middle" class="label" fill="#4a90d9">USB-C (PC)</text>

  <!-- MPU6050 -->
  <rect x="290" y="60" width="110" height="160" rx="6" fill="none" stroke="#27ae60" stroke-width="2"/>
  <text x="345" y="52" text-anchor="middle" font-weight="bold" fill="#27ae60">MPU6050</text>
  <circle cx="290" cy="97" r="3" fill="#e74c3c"/>
  <text x="300" y="101" class="pin">VCC</text>
  <circle cx="290" cy="122" r="3" fill="#2c2c2c"/>
  <text x="300" y="126" class="pin">GND</text>
  <circle cx="290" cy="147" r="3" fill="#f39c12"/>
  <text x="300" y="151" class="pin">SDA</text>
  <circle cx="290" cy="172" r="3" fill="#9b59b6"/>
  <text x="300" y="176" class="pin">SCL</text>
  <text x="345" y="205" text-anchor="middle" class="label" fill="#666">XDA XCL ADO INT</text>
  <text x="345" y="218" text-anchor="middle" class="label" fill="#666">not connected</text>

  <!-- Wires ESP32 -> MPU6050 -->
  <line x1="60" y1="117" x2="30" y2="117" stroke="#e74c3c" stroke-width="1.5"/>
  <line x1="30" y1="117" x2="30" y2="97" stroke="#e74c3c" stroke-width="1.5"/>
  <line x1="30" y1="97" x2="290" y2="97" stroke="#e74c3c" stroke-width="1.5"/>
  <line x1="60" y1="142" x2="20" y2="142" stroke="#555" stroke-width="1.5"/>
  <line x1="20" y1="142" x2="20" y2="122" stroke="#555" stroke-width="1.5"/>
  <line x1="20" y1="122" x2="290" y2="122" stroke="#555" stroke-width="1.5"/>
  <line x1="60" y1="177" x2="10" y2="177" stroke="#f39c12" stroke-width="1.5"/>
  <line x1="10" y1="177" x2="10" y2="147" stroke="#f39c12" stroke-width="1.5"/>
  <line x1="10" y1="147" x2="290" y2="147" stroke="#f39c12" stroke-width="1.5"/>
  <line x1="60" y1="202" x2="5" y2="202" stroke="#9b59b6" stroke-width="1.5"/>
  <line x1="5" y1="202" x2="5" y2="172" stroke="#9b59b6" stroke-width="1.5"/>
  <line x1="5" y1="172" x2="290" y2="172" stroke="#9b59b6" stroke-width="1.5"/>

  <!-- Fan -->
  <rect x="480" y="60" width="130" height="120" rx="6" fill="none" stroke="#e67e22" stroke-width="2"/>
  <text x="545" y="52" text-anchor="middle" font-weight="bold" fill="#e67e22">FAN 3-pin</text>
  <circle cx="480" cy="97" r="3" fill="#e74c3c"/>
  <text x="490" y="101" class="pin">Red  +12V</text>
  <circle cx="480" cy="122" r="3" fill="#2c2c2c"/>
  <text x="490" y="126" class="pin">Black  GND</text>
  <circle cx="480" cy="147" r="3" fill="#27ae60"/>
  <text x="490" y="151" class="pin">Yellow  TACHO</text>

  <!-- Tachometer wire fan -> ESP32 D4 -->
  <line x1="480" y1="147" x2="440" y2="147" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="440" y1="147" x2="440" y2="242" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="440" y1="242" x2="180" y2="242" stroke="#27ae60" stroke-width="1.5"/>

  <!-- Common GND fan -> ESP32 -->
  <line x1="480" y1="122" x2="450" y2="122" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="122" x2="450" y2="267" stroke="#555" stroke-width="1.5"/>
  <line x1="450" y1="267" x2="180" y2="267" stroke="#555" stroke-width="1.5"/>

  <!-- Power Supply -->
  <rect x="480" y="240" width="130" height="100" rx="6" fill="none" stroke="#c0392b" stroke-width="2"/>
  <text x="545" y="232" text-anchor="middle" font-weight="bold" fill="#c0392b">12V PSU</text>
  <text x="545" y="268" text-anchor="middle" class="label">Barrel jack adapter</text>
  <circle cx="480" cy="295" r="3" fill="#e74c3c"/>
  <text x="490" y="299" class="pin">+ 12V</text>
  <circle cx="480" cy="320" r="3" fill="#2c2c2c"/>
  <text x="490" y="324" class="pin">- GND</text>

  <!-- PSU + -> fan red -->
  <line x1="480" y1="295" x2="460" y2="295" stroke="#e74c3c" stroke-width="1.5"/>
  <line x1="460" y1="295" x2="460" y2="97" stroke="#e74c3c" stroke-width="1.5"/>
  <line x1="460" y1="97" x2="480" y2="97" stroke="#e74c3c" stroke-width="1.5"/>

  <!-- PSU GND -> fan black -->
  <line x1="480" y1="320" x2="455" y2="320" stroke="#555" stroke-width="1.5"/>
  <line x1="455" y1="320" x2="455" y2="122" stroke="#555" stroke-width="1.5"/>
  <line x1="455" y1="122" x2="480" y2="122" stroke="#555" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="60" y="390" width="580" height="55" rx="4" fill="none" stroke="#ccc" stroke-width="1"/>
  <text x="80" y="408" class="label" font-weight="bold">Legend</text>
  <line x1="80" y1="425" x2="110" y2="425" stroke="#e74c3c" stroke-width="2"/>
  <text x="115" y="429" class="label">3.3V / 12V power</text>
  <line x1="230" y1="425" x2="260" y2="425" stroke="#555" stroke-width="2"/>
  <text x="265" y="429" class="label">GND (common)</text>
  <line x1="370" y1="425" x2="400" y2="425" stroke="#f39c12" stroke-width="2"/>
  <text x="405" y="429" class="label">SDA</text>
  <line x1="440" y1="425" x2="470" y2="425" stroke="#9b59b6" stroke-width="2"/>
  <text x="475" y="429" class="label">SCL</text>
  <line x1="510" y1="425" x2="540" y2="425" stroke="#27ae60" stroke-width="2"/>
  <text x="545" y="429" class="label">Tachometer</text>
</svg>
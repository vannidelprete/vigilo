services:
  influxdb:
    image: influxdb:2.9.1
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-changeme123}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-vigilo}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-telemetry}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-changeme-token}
      INFLUXD_TLS_CERT: /etc/ssl/vigilo/cert.pem
      INFLUXD_TLS_KEY: /etc/ssl/vigilo/key.pem
    volumes:
      - ./influxdb-storage:/var/lib/influxdb2
      - ./certs:/etc/ssl/vigilo:ro
    healthcheck:
      test: ["CMD", "influx", "ping", "--host", "https://localhost:8086", "--skip-verify"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:13.0.3
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme123}
      GF_SERVER_PROTOCOL: https
      GF_SERVER_CERT_FILE: /etc/ssl/vigilo/cert.pem
      GF_SERVER_CERT_KEY: /etc/ssl/vigilo/key.pem
      INFLUXDB_ORG: ${INFLUXDB_ORG:-vigilo}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-telemetry}
      INFLUXDB_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-changeme-token}
    volumes:
      - ./grafana-storage:/var/lib/grafana
      - ./certs:/etc/ssl/vigilo:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      influxdb:
        condition: service_healthy

  bridge:
    build: ./bridge
    restart: unless-stopped
    environment:
      MQTT_BROKER: ${MQTT_BROKER:-host.docker.internal}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-vigilo/+/#}
      INFLUXDB_URL: https://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-changeme-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-vigilo}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-telemetry}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      influxdb:
        condition: service_healthy
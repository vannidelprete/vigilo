name: Dashboard

on:
  push:
    paths:
      - 'dashboard/**'
  pull_request:
    paths:
      - 'dashboard/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate Docker Compose
        run: docker compose -f dashboard/docker-compose.yml config

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff --root-user-action=ignore

      - name: Lint Python bridge
        run: ruff check dashboard/